services:

  # ──────────────────────────────────────────────────────────────
  # Base de données MariaDB (mysqldump)
  # ──────────────────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret_pass}
      MYSQL_DATABASE: bookstack
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-secret_pass}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # Base de données PostgreSQL (pg_dump)
  # ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pgpass}
      POSTGRES_DB: ${POSTGRES_DB:-pgdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pguser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # Application Bookstack
  # ──────────────────────────────────────────────────────────────
  bookstack:
    image: lscr.io/linuxserver/bookstack
    container_name: bookstack
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-secret_pass}
      DB_DATABASE: bookstack
    volumes:
      - bookstack_files:/config
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "6875:80"

  # ──────────────────────────────────────────────────────────────
  # Agent de sauvegarde Restic
  # ──────────────────────────────────────────────────────────────
  backup_agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backup
    container_name: backup_agent
    environment:
      # Restic — dépôt et mot de passe via fichier sécurisé
      RESTIC_REPOSITORY: /backup_repo
      RESTIC_PASSWORD_FILE: /run/secrets/restic_pw

      # MariaDB
      MYSQL_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret_pass}

      # PostgreSQL
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-pguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pgpass}
      POSTGRES_DB: ${POSTGRES_DB:-pgdb}

      # Restic — configuration S3 (MinIO)
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      RESTIC_REMOTE_REPOSITORY: s3:http://minio:9000/restic-bucket
    volumes:
      # Volumes Docker à sauvegarder (lecture seule)
      - bookstack_files:/data/bookstack:ro
      - db_data:/data/db_data:ro
      - postgres_data:/data/postgres_data:ro

      # Dépôt Restic — simule un disque séparé (loop device)
      - ../my_restic_repo:/backup_repo

      # Fichier de mot de passe sécurisé (lecture seule)
      - ../restic_password.txt:/run/secrets/restic_pw:ro
    depends_on:
      db:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # ──────────────────────────────────────────────────────────────
  # Stockage Objet MinIO (Simulation Cloud S3)
  # ──────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Initialisation du bucket MinIO
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/restic-bucket || true;
      exit 0;
      "

volumes:
  db_data:
  postgres_data:
  bookstack_files:
  minio_data:
